<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Shelf Capacity Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f4f8;
    }
    .bg-primary { background-color: #0a2439; }
    .text-primary { color: #0a2439; }
    .border-primary { border-color: #0a2439; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* COMPACT PRINT STYLES */
    @media print {
      body { background-color: white; padding: 0; margin: 0; }
      .no-print { display: none !important; }
      .calculator-box { 
        box-shadow: none !important; 
        border: none !important; 
        width: 100% !important; 
        max-width: none !important; 
        margin: 0 !important;
      }
      .bg-primary { 
        background: transparent !important; 
        color: black !important; 
        padding: 5px 0 !important;
        border-bottom: 2px solid black !important;
        text-align: left !important;
      }
      .bg-primary h1 { font-size: 1.25rem !important; }
      .bg-primary p { font-size: 0.75rem !important; color: black !important; }
      
      .bg-slate-50 { 
        background: transparent !important; 
        padding: 10px 0 !important; 
        border-bottom: 1px dashed #ccc !important;
      }
      
      #rowsContainer { max-height: none !important; overflow: visible !important; }
      
      .grid-row { 
        padding: 2px 0 !important; 
        border-bottom: 1px solid #eee !important;
        background: transparent !important;
      }
      
      select { 
        appearance: none; 
        border: none !important; 
        background: transparent !important; 
        font-weight: 500;
        font-size: 0.875rem !important;
        padding: 0 !important;
      }
      
      .row-result-mm { font-size: 0.875rem !important; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="calculator-box bg-white max-w-2xl w-full border-2 border-primary rounded-lg overflow-hidden shadow-2xl">
    <div class="bg-primary p-6 text-white text-center">
        <h1 class="text-2xl font-bold tracking-tight uppercase">Library Shelf Capacity Calculator</h1>
        <p class="text-xs opacity-70 mt-1 uppercase tracking-widest font-medium">Metric Dimensioning & Inventory Tool</p>
    </div>

    <div class="bg-slate-50 p-6 flex justify-between items-center border-b border-gray-200">
      <div>
        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Total Span</h2>
        <div class="text-4xl font-mono font-bold text-primary"><span id="totalMeters">0.000</span> <span class="text-xl font-normal">m</span></div>
      </div>
      <div class="text-right">
        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Est. Capacity</h2>
        <div class="text-3xl font-mono font-bold text-blue-600"><span id="bookCount">0</span> <span class="text-lg font-normal">books</span></div>
      </div>
    </div>

    <div class="p-6 space-y-4">
      <div class="grid grid-cols-12 gap-4 px-2 text-xs font-bold text-gray-400 uppercase">
        <div class="col-span-5 text-left">Shelf Width (mm)</div>
        <div class="col-span-3 text-center">Qty</div>
        <div class="col-span-3 text-right">Subtotal (mm)</div>
        <div class="col-span-1 no-print"></div>
      </div>

      <div id="rowsContainer" class="space-y-2 max-h-80 overflow-y-auto custom-scrollbar pr-2 print:space-y-0">
      </div>

      <div id="summarySection" class="mt-6 border-t pt-4">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Shelf Inventory Summary</h3>
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="border-b border-gray-300 text-left">
              <th class="py-1">Shelf Size</th>
              <th class="py-1 text-right">Total Quantity Used</th>
            </tr>
          </thead>
          <tbody id="summaryTableBody">
            </tbody>
        </table>
      </div>

      <div class="pt-4 space-y-4 no-print">
        <div class="flex flex-wrap gap-3">
            <button id="addRowBtn" class="flex-1 bg-primary text-white py-3 rounded-md font-semibold hover:bg-slate-800 transition flex items-center justify-center gap-2">
              Add Row
            </button>
            <button id="printBtn" class="px-6 py-3 bg-green-600 text-white rounded-md font-semibold hover:bg-green-700 transition flex items-center gap-2">
              Print Report
            </button>
            <button id="resetBtn" class="px-6 py-3 border border-red-200 text-red-500 rounded-md font-semibold hover:bg-red-50 transition">
              Reset
            </button>
        </div>
      </div>

      <div class="bg-blue-50 p-3 rounded-md border border-blue-100 mt-4 print:bg-white print:border-none print:mt-2">
          <p class="text-[11px] text-blue-700 leading-tight print:text-black">
              <strong>Note:</strong> Capacity based on 21mm book thickness.
          </p>
      </div>
    </div>
  </div>

  <script>
    const rowsContainer = document.getElementById('rowsContainer');
    const totalMetersDisplay = document.getElementById('totalMeters');
    const bookCountDisplay = document.getElementById('bookCount');
    const summaryTableBody = document.getElementById('summaryTableBody');
    const addRowBtn = document.getElementById('addRowBtn');
    const resetBtn = document.getElementById('resetBtn');
    const printBtn = document.getElementById('printBtn');

    const dimensionsMm = [370, 575, 650, 750, 816, 886, 1025];
    const quantities = [1, 2, 3, 4, 5, 6, 7, 8];
    const BOOK_THICKNESS_MM = 21;

    function createRow() {
      const rowDiv = document.createElement('div');
      rowDiv.className = "grid-row grid grid-cols-12 gap-4 items-center p-3 bg-white border border-gray-200 rounded-lg shadow-sm";
      
      rowDiv.innerHTML = `
        <div class="col-span-5">
          <select class="val-select w-full p-2 bg-gray-50 border border-gray-200 rounded text-sm font-medium">
            ${dimensionsMm.map(v => `<option value="${v}">${v} mm</option>`).join('')}
          </select>
        </div>
        <div class="col-span-3">
          <select class="mul-select w-full p-2 bg-gray-50 border border-gray-200 rounded text-sm text-center font-medium">
            ${quantities.map(m => `<option value="${m}">${m}</option>`).join('')}
          </select>
        </div>
        <div class="col-span-3 font-mono font-bold text-primary text-right px-2 row-result-mm">
          0
        </div>
        <div class="col-span-1 text-right no-print">
          <button class="remove-btn text-gray-300 hover:text-red-500 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
          </button>
        </div>
      `;

      const valSelect = rowDiv.querySelector('.val-select');
      const mulSelect = rowDiv.querySelector('.mul-select');
      const removeBtn = rowDiv.querySelector('.remove-btn');

      [valSelect, mulSelect].forEach(select => {
        select.addEventListener('change', () => {
          updateRowResult(rowDiv);
          calculateFinals();
        });
      });

      removeBtn.addEventListener('click', () => {
        rowDiv.remove();
        calculateFinals();
      });

      rowsContainer.appendChild(rowDiv);
      updateRowResult(rowDiv);
      calculateFinals();
    }

    function updateRowResult(row) {
      const val = parseFloat(row.querySelector('.val-select').value);
      const qty = parseFloat(row.querySelector('.mul-select').value);
      row.querySelector('.row-result-mm').textContent = (val * qty).toFixed(0);
    }

    function calculateFinals() {
      let totalMm = 0;
      let inventory = {};

      // Initialize inventory with 0 for all possible dimensions
      dimensionsMm.forEach(d => inventory[d] = 0);

      document.querySelectorAll('.grid-row').forEach(row => {
        const val = row.querySelector('.val-select').value;
        const qty = parseInt(row.querySelector('.mul-select').value);
        const subtotal = parseFloat(row.querySelector('.row-result-mm').textContent);
        
        totalMm += subtotal;
        inventory[val] += qty;
      });

      // Update Displays
      totalMetersDisplay.textContent = (totalMm / 1000).toFixed(3);
      bookCountDisplay.textContent = Math.floor(totalMm / BOOK_THICKNESS_MM).toLocaleString(); 

      // Update Summary Table
      summaryTableBody.innerHTML = '';
      Object.keys(inventory).forEach(size => {
        if (inventory[size] > 0) {
          const tr = document.createElement('tr');
          tr.className = "border-b border-gray-100";
          tr.innerHTML = `
            <td class="py-1 font-medium">${size} mm Shelf</td>
            <td class="py-1 text-right font-bold">${inventory[size]}</td>
          `;
          summaryTableBody.appendChild(tr);
        }
      });
      
      // Hide summary header if empty
      document.getElementById('summarySection').style.display = totalMm > 0 ? 'block' : 'none';
    }

    addRowBtn.addEventListener('click', createRow);
    resetBtn.addEventListener('click', () => { rowsContainer.innerHTML = ''; createRow(); });
    printBtn.addEventListener('click', () => { window.print(); });

    createRow();
  </script>
</body>
</html>
